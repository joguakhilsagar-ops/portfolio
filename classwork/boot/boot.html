<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Cars Showroom</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* =====================
   GLOBAL STYLES
===================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:#111;
    color:#fff;
}

/* =====================
   CUSTOM NAVBAR STYLE
===================== */
.navbar{
    background:#000 !important;
}

.navbar-brand{
    color:#f39c12 !important;
    font-weight:bold;
    letter-spacing:2px;
}

.nav-link{
    color:#fff !important;
    margin-left:20px;
    position:relative;
}

.nav-link::after{
    content:'';
    position:absolute;
    left:0;
    bottom:-5px;
    width:0%;
    height:2px;
    background:#f39c12;
    transition:0.4s;
}

.nav-link:hover::after{
    width:100%;
}

/* =====================
   HERO SECTION
===================== */
.hero{
    height:90vh;
    background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') no-repeat center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
}

.hero h1{
    font-size:60px;
    animation:fadeIn 2s ease-in-out;
}

.hero p{
    margin-top:15px;
    font-size:20px;
}

.btn-custom{
    margin-top:20px;
    padding:12px 30px;
    border:none;
    background:#f39c12;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn-custom:hover{
    background:#fff;
    transform:scale(1.1);
}

/* =====================
   CARS SECTION (GRID)
===================== */
.cars{
    padding:80px 50px;
    text-align:center;
}

.cars h2{
    margin-bottom:40px;
    font-size:40px;
}

.car-container{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:30px;
}

.car-card{
    background:#222;
    border-radius:10px;
    overflow:hidden;
    transition:0.5s;
}

.car-card img{
    width:100%;
    transition:0.5s;
}

.car-card:hover{
    transform:translateY(-10px);
    box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

.car-card:hover img{
    transform:scale(1.1);
}

.car-info{
    padding:20px;
}

.car-info h3{
    color:#f39c12;
}

/* =====================
   ANIMATION
===================== */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>
<body>

<!-- =====================
     BOOTSTRAP NAVBAR
===================== -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand" href="#">AutoLux</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Cars</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Contact</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>Premium Cars Showroom</h1>
    <p>Experience Luxury & Performance</p>
    <button class="btn-custom">Explore Now</button>
</section>

<!-- CARS -->
<section class="cars">
    <h2>Our Collection</h2>
    <div class="car-container">

        <div class="car-card">
            <img src="https://images.unsplash.com/photo-1549924231-f129b911e442">
            <div class="car-info">
                <h3>BMW M4</h3>
                <p>Powerful engine with stunning design.</p>
            </div>
        </div>

        <div class="car-card">
            <img src="https://images.unsplash.com/photo-1502877338535-766e1452684a">
            <div class="car-info">
                <h3>Audi R8</h3>
                <p>Luxury meets high performance.</p>
            </div>
        </div>

        <div class="car-card">
            <img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c">
            <div class="car-info">
                <h3>Mercedes AMG</h3>
                <p>Elegance with unmatched speed.</p>
            </div>
        </div>

    </div>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
